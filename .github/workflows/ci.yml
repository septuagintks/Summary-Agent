name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Package Extension
        run: |
          zip -r extension.zip . -x "*.git*" -x "node_modules/*" -x "src/lib/__tests__/*" -x "vitest.config.js" -x "package*.json" -x "*.md" -x ".github/*"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: summary-agent-extension
          path: extension.zip
