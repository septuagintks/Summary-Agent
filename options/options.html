<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Summary Agent — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="card">
      <header>
        <h1 data-i18n="opt.title"></h1>
      </header>

      <section class="field-block">
        <div class="lbl-row">
          <span class="lbl" data-i18n="opt.language"></span>
        </div>
        <select id="f-lang" class="lang-select"></select>
      </section>

      <section class="field-block">
        <div class="lbl-row">
          <span class="lbl" data-i18n="opt.mode"></span>
        </div>
        <div class="segmented" id="f-mode" role="radiogroup">
          <button type="button" class="seg" data-value="off"      role="radio" data-i18n="opt.mode.off"></button>
          <button type="button" class="seg" data-value="on-open"  role="radio" data-i18n="opt.mode.onOpen"></button>
          <button type="button" class="seg" data-value="implicit" role="radio" data-i18n="opt.mode.implicit"></button>
        </div>
        <div class="hint" id="f-mode-hint"></div>
      </section>

      <section class="presets" id="presets"></section>

      <section class="custom-tools field-block" id="custom-tools" hidden>
        <div class="lbl-row">
          <span class="lbl" data-i18n="opt.custom.toolsLabel"></span>
        </div>
        <div class="ct-row">
          <select id="ct-compat">
            <option value="openai">OpenAI / Chat Completions</option>
            <option value="openai-responses">OpenAI / Responses</option>
            <option value="anthropic">Anthropic / Messages</option>
            <option value="gemini">Gemini / generateContent</option>
          </select>
          <button type="button" id="ct-delete" class="danger" data-i18n="opt.custom.deleteCurrent"></button>
        </div>
      </section>

      <div class="modal" id="custom-modal" role="dialog" aria-modal="true" aria-labelledby="custom-modal-title" hidden>
        <div class="modal-card">
          <h2 id="custom-modal-title" data-i18n="opt.custom.title"></h2>
          <label><span data-i18n="opt.custom.name"></span>
            <input id="cp-name" type="text" placeholder="My Provider" />
          </label>
          <label><span data-i18n="opt.custom.url"></span>
            <input id="cp-url" type="text" placeholder="https://api.example.com/v1/chat/completions" />
          </label>
          <label><span data-i18n="opt.custom.apiKey"></span>
            <div class="key-wrap">
              <input id="cp-key" type="password" placeholder="sk-..." autocomplete="off" />
              <button type="button" id="cp-key-eye" class="key-eye" aria-pressed="false" tabindex="-1"></button>
            </div>
            <div class="hint" id="cp-key-hint" data-i18n="opt.custom.apiKeyHint"></div>
          </label>
          <label><span data-i18n="opt.custom.compat"></span>
            <select id="cp-compat">
              <option value="openai">OpenAI / Chat Completions</option>
              <option value="openai-responses">OpenAI / Responses</option>
              <option value="anthropic">Anthropic / Messages</option>
              <option value="gemini">Gemini / generateContent</option>
            </select>
          </label>
          <label><span data-i18n="opt.custom.model"></span>
            <input id="cp-model" type="text" placeholder="model-id" />
          </label>
          <div class="hint" data-i18n="opt.custom.hint"></div>
          <div id="cp-error" class="cp-error" hidden></div>
          <div class="modal-actions">
            <button type="button" id="cp-cancel" class="secondary" data-i18n="opt.custom.cancel"></button>
            <button type="button" id="cp-save"   class="primary"   data-i18n="opt.custom.add"></button>
          </div>
        </div>
      </div>

      <label><span data-i18n="opt.apiUrl"></span>
        <input id="f-url" type="text" placeholder="https://api.openai.com/v1/chat/completions" />
      </label>
      <label><span data-i18n="opt.apiKey"></span>
        <div class="key-wrap">
          <input id="f-key" type="password" placeholder="sk-..." autocomplete="off" />
          <button type="button" id="f-key-eye" class="key-eye" aria-pressed="false" tabindex="-1"></button>
        </div>
      </label>
      <label><span data-i18n="opt.model"></span>
        <select id="f-model-quick" class="model-quick"></select>
        <input id="f-model" type="text" placeholder="gpt-3.5-turbo" />
      </label>
      <div class="row">
        <label><span data-i18n="opt.maxTokens"></span>
          <input id="f-tokens" type="number" min="100" max="8000" />
        </label>
        <label><span data-i18n="opt.maxLen"></span>
          <input id="f-maxlen" type="number" min="1000" max="50000" />
        </label>
        <label><span data-i18n="opt.temperature"></span>
          <input id="f-temp" type="number" step="0.1" min="0" max="2" />
        </label>
      </div>
      <label class="inline">
        <input id="f-stream" type="checkbox" /> <span data-i18n="opt.stream"></span>
      </label>
      <label><span data-i18n="opt.sysPrompt"></span>
        <textarea id="f-sys" rows="3"></textarea>
      </label>
      <label><span data-i18n="opt.userPrompt"></span> <small data-i18n="opt.userPromptVars"></small>
        <textarea id="f-prompt" rows="8"></textarea>
      </label>

      <footer>
        <button id="reset"  class="secondary" data-i18n="opt.reset"></button>
        <button id="save"   class="primary"   data-i18n="opt.save"></button>
        <span id="status" class="status"></span>
      </footer>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
